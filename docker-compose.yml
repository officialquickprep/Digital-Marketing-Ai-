version: '3.8'

services:
  db:
    image: postgres:16
    container_name: digitalai_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: digitalai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: digitalai_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
